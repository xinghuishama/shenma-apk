name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          rm gradle.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix startup black screen (no white flash)
        run: |
          # 1. 黑色主题
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-v31
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
                  <item name="android:statusBarColor">@android:color/black</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
              </style>
          </resources>
          EOF
          cat > app/src/main/res/values-v31/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
                  <item name="android:windowSplashScreenBackground">@android:color/black</item>
                  <item name="android:windowSplashScreenAnimatedIcon">@android:color/black</item>
                  <item name="android:statusBarColor">@android:color/black</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
              </style>
          </resources>
          EOF
          # 应用主题
          sed -i 's/android:theme="@style\/[^"]*"/android:theme="@style\/AppTheme"/g' app/src/main/AndroidManifest.xml
          sed -i 's/android:theme="@android:style\/[^"]*"/android:theme="@style\/AppTheme"/g' app/src/main/AndroidManifest.xml
          if ! grep -q 'android:theme=' app/src/main/AndroidManifest.xml; then
            sed -i 's/<application/<application android:theme="@style\/AppTheme"/g' app/src/main/AndroidManifest.xml
          fi
          # 2. WebView 和窗口背景设为黑色
          for f in $(find app/src -name "MainActivity.java" -o -name "MainActivity.kt"); do
            if [ "${f##*.}" = "java" ]; then
              sed -i 's/super\.onCreate(savedInstanceState);/super.onCreate(savedInstanceState);\n        getWindow().setBackgroundDrawable(new android.graphics.drawable.ColorDrawable(0xFF000000));/g' "$f"
              sed -i 's/webView\.loadUrl/webView.setBackgroundColor(0xFF000000);\n        webView.loadUrl/g' "$f"
            else
              sed -i 's/super\.onCreate(savedInstanceState)/super.onCreate(savedInstanceState)\n        window.setBackgroundDrawable(android.graphics.drawable.ColorDrawable(0xFF000000))/g' "$f"
              sed -i 's/webView\.loadUrl/webView.setBackgroundColor(0xFF000000)\n        webView.loadUrl/g' "$f"
            fi
          done
          # 3. layout XML 背景黑色
          for f in $(find app/src -name "*.xml" -path "*/layout/*"); do
            sed -i 's/<WebView/<WebView android:background="@android:color\/black"/g' "$f"
            sed -i 's/<LinearLayout/<LinearLayout android:background="@android:color\/black"/g' "$f"
            sed -i 's/<RelativeLayout/<RelativeLayout android:background="@android:color\/black"/g' "$f"
            sed -i 's/<FrameLayout/<FrameLayout android:background="@android:color\/black"/g' "$f"
          done

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
