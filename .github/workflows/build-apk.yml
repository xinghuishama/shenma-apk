name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download and install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          rm gradle.zip
          echo "$PWD/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Fix startup black screen
        run: |
          # 1. 黑色主题
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/values-v31
          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
                  <item name="android:statusBarColor">@android:color/black</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
              </style>
          </resources>
          EOF
          cat > app/src/main/res/values-v31/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
                  <item name="android:windowBackground">@android:color/black</item>
                  <item name="android:windowSplashScreenBackground">@android:color/black</item>
                  <item name="android:windowSplashScreenAnimatedIcon">@android:color/black</item>
                  <item name="android:statusBarColor">@android:color/black</item>
                  <item name="android:navigationBarColor">@android:color/black</item>
              </style>
          </resources>
          EOF
          # 应用主题到 Manifest
          sed -i 's/android:theme="@style\/[^"]*"/android:theme="@style\/AppTheme"/g' app/src/main/AndroidManifest.xml
          sed -i 's/android:theme="@android:style\/[^"]*"/android:theme="@style\/AppTheme"/g' app/src/main/AndroidManifest.xml
          if ! grep -q 'android:theme=' app/src/main/AndroidManifest.xml; then
            sed -i 's/<application/<application android:theme="@style\/AppTheme"/g' app/src/main/AndroidManifest.xml
          fi
          
          # 修复 roundIcon 指向缺失的 ic_launcher_round
          sed -i 's/android:roundIcon="@mipmap\/ic_launcher_round"/android:roundIcon="@mipmap\/ic_launcher"/g' app/src/main/AndroidManifest.xml

          # 2. 直接重写 activity_main.xml（避免 sed 破坏 XML）
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@android:color/black">

              <WebView
                  android:id="@+id/webView"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:background="@android:color/black" />

          </FrameLayout>
          EOF

          # 3. 直接重写 MainActivity.java（避免 sed 破坏语法）
          cat > app/src/main/java/com/xinghuishama/shenma/MainActivity.java << 'EOF'
          package com.xinghuishama.shenma;

          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.graphics.drawable.ColorDrawable;
          import androidx.appcompat.app.AppCompatActivity;

          public class MainActivity extends AppCompatActivity {
              private WebView webView;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  getWindow().setBackgroundDrawable(new ColorDrawable(0xFF000000));
                  setContentView(R.layout.activity_main);
                  
                  webView = findViewById(R.id.webView);
                  webView.setBackgroundColor(0xFF000000);
                  
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }
          }
          EOF

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
