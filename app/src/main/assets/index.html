<!DOCTYPE html>
<html lang="zh-CN">
<head>

      margin: 0;
      padding: 0;

  <style>
    /* ========== 原 style.css 内容 ========== */
    *{box-sizing:border-box; -webkit-tap-highlight-color: transparent; margin:0; padding:0;}
    body {
      font-family: 'Orbitron', system-ui, -apple-system, sans-serif;
      background: #080818;
      min-height: 100vh;
      padding-bottom: 80px;
      touch-action: manipulation;
      color: #e0e0e0;
    }
    .mech-grid::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(0,255,234,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,255,234,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .ball-3d {
      position: relative;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font: 15px/1 'Orbitron', sans-serif;
      font-weight: bold;
      color: white;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3), inset 0 -2px 4px rgba(0,0,0,0.2);
      transition: filter 0.2s ease, transform 0.1s;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      overflow: visible;
      border: none;
      outline: none;
      flex-shrink: 0;
    }
    .ball-3d::after {
      content: '';
      position: absolute;
      top: 12%;
      left: 14%;
      width: 24%;
      height: 14%;
      background: radial-gradient(ellipse at center, rgba(255,255,255,0.75) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .ball-3d:active { transform: scale(0.92); }
    .ball-red {
      background:
        radial-gradient(circle at 28% 20%, rgba(255,255,255,0.35) 0%, transparent 20%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(0,0,0,0.3) 0%, transparent 55%),
        linear-gradient(165deg, #ff3333 0%, #cc0000 60%, #990000 100%);
    }
    .ball-green {
      background:
        radial-gradient(circle at 28% 20%, rgba(255,255,255,0.35) 0%, transparent 20%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(0,0,0,0.3) 0%, transparent 55%),
        linear-gradient(165deg, #33cc33 0%, #118811 60%, #005500 100%);
    }
    .ball-blue {
      background:
        radial-gradient(circle at 28% 20%, rgba(255,255,255,0.35) 0%, transparent 20%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.06) 0%, transparent 40%),
        radial-gradient(circle at 50% 100%, rgba(0,0,0,0.3) 0%, transparent 55%),
        linear-gradient(165deg, #4488ff 0%, #2244cc 60%, #112288 100%);
    }
    .ball-gray { background: #666 !important; box-shadow: 0 0 4px rgba(0,0,0,0.5); filter: none !important; }
    .hit-mark {
      position: absolute;
      bottom: -2px;
      right: -2px;
      color: #ffeb3b;
      font-size: 10px;
      font-weight: 900;
      font-family: monospace;
      z-index: 2;
      text-shadow: 0 0 2px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,0.7);
      background: transparent;
      pointer-events: none;
      line-height: 1;
    }
    .hit-mark.cross {
      color: #ff3333;
      font-size: 14px;
      bottom: -4px;
      right: -1px;
      text-shadow: 0 0 2px rgba(255,255,255,0.5), 0 0 4px rgba(0,0,0,0.8);
    }
    #result .ball-3d { width: 34px; height: 34px; font-size: 12px; }
    #result .ball-3d::after { width: 22%; height: 12%; top: 10%; left: 12%; }
    #result .ball-3d .hit-mark { font-size: 9px; bottom: -3px; right: -2px; }
    #result .ball-3d .hit-mark.cross { font-size: 12px; bottom: -5px; right: -2px; }

    .flash-unique {
      animation: flashPulse 0.8s ease-in-out infinite;
      will-change: transform, opacity;
      transform: translateZ(0);
      box-shadow: 0 0 15px rgba(0, 255, 234, 0.3) !important;
      z-index: 10;
    }
    @keyframes flashPulse {
      0%, 100% { opacity: 1; transform: scale(1) translateZ(0); }
      50% { opacity: 0.7; transform: scale(1.12) translateZ(0); }
    }
    .kill-line {

    @media (max-width: 420px) {

    .history-ball-tag {
      width: 100%;
      background: #fff;
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      color: #333;
      padding: 2px 1px;
      line-height: 1.2;
      white-space: nowrap;

    .history-plus-sign {
      display: flex;
      align-items: center;
      font-size: 18px;
      font-weight: 900;
      color: #aaa;
      padding: 0 2px;
      align-self: center;
    }
    .history-item {
      background: #0f0f1a;
      border: 1px solid rgba(0,255,234,0.1);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .history-item-header {
      font-size: 12px;
      color: #00ffea;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .history-balls-row {
      display: flex;
      justify-content: flex-start;
      align-items: stretch;
      gap: 3px;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    #historyContent {
      contain: content;
      max-height: 50vh;
      overflow-y: auto;
    }
    @media (max-width: 420px) {
      .history-ball-card { min-width: 36px; }
      .history-ball-number { font-size: 15px; padding: 3px 1px; }
      .history-ball-tag { font-size: 9px; padding: 1px; }
      .history-plus-sign { font-size: 14px; padding: 0 1px; }
      .history-balls-row { gap: 2px; }
      .history-item { padding: 8px 6px; }
      .history-item-header { font-size: 11px; margin-bottom: 6px; }
    }
    .flying-unique-ball {
      position: fixed;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      z-index: 9999;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 900;
      font-size: 16px;
      font-family: 'Orbitron', sans-serif;
      will-change: transform;
      box-shadow: 0 0 25px currentColor, 0 0 50px currentColor, inset 0 0 10px rgba(255,255,255,0.5);
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    .flying-trail {
      position: fixed;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.6;
    }
    .landing-shock {
      animation: landShake 0.4s ease !important;
    }
    @keyframes landShake {
      0% { transform: scale(1); }

      75% { transform: scale(1.08) rotate(-2deg); }
      100% { transform: scale(1) rotate(0); }
    }
    .zero-count-section {
      margin-top: 10px;
      padding-top: 8px;

    .zero-count-label {

      color: #ff6b6b;
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
  </style>
</head>

(function () {

  const DUAN = {

  const numProps = new Array(50);

  let currentHistoryData = [], currentHistorySorted = [], currentHistoryPage = 1, historyCache = {}, historyYearLoaded = null;
  function ensureHistorySorted() {
    if (currentHistorySorted.length) return;
    const seen = new Set();
    const unique = [];
    for (const item of currentHistoryData) {
      if (item && item.expect && !seen.has(item.expect)) {
        seen.add(item.expect);
        unique.push(item);
      }
    }
    currentHistorySorted = unique.sort((a,b) => String(b.expect).localeCompare(String(a.expect), undefined, { numeric: true }));
  }
  function renderHistoryPage() {
    const cont = document.getElementById('historyContent');
    const pagi = document.getElementById('historyPagination');
    ensureHistorySorted();
    if (!currentHistorySorted.length) {
      if (cont) cont.innerHTML = '<div class="text-gray-500 py-8 text-center">暂无数据</div>';
      if (pagi) pagi?.classList.add('hidden');
      return;
    }
    const totalPages = Math.max(1, Math.ceil(currentHistorySorted.length / HISTORY_PAGE_SIZE));
    if (currentHistoryPage > totalPages) currentHistoryPage = totalPages;
    const start = (currentHistoryPage - 1) * HISTORY_PAGE_SIZE;
    const pageData = currentHistorySorted.slice(start, start + HISTORY_PAGE_SIZE);
    const frag = document.createDocumentFragment();
    for (const item of pageData) {
      const expect = escapeHtml(item.expect || '');
      let ballsHtml = '';
      if (item.openCode && item.openCode.trim()) {
        const codes = item.openCode.split(',').map(c => escapeHtml(c.trim()));
        const waves = (item.wave || '').split(',').map(w => escapeHtml(w.trim()));
        const zodiacs = (item.zodiac || '').split(',').map(z => escapeHtml(z.trim()));
        ballsHtml = renderBallsHTML(codes, waves, zodiacs);
      } else {
        ballsHtml = '<div class="flex justify-center items-center py-6 text-amber-400 text-sm font-medium">待开奖</div>';
      }
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<div class="history-item-header">第${expect.slice(4)}期 · ${escapeHtml(item.openTime && item.openTime.slice(5,16) || '')}</div><div class="history-balls-row">${ballsHtml}</div>`;
      frag.appendChild(div);
    }
    if (cont) { cont.innerHTML = ''; cont.appendChild(frag); }
    const pageNumEl = document.getElementById('historyPageNum');
    const totalPagesEl = document.getElementById('historyTotalPages');
    if (pageNumEl) pageNumEl.textContent = currentHistoryPage;
    if (totalPagesEl) totalPagesEl.textContent = totalPages;
    if (pagi) {
      pagi.classList.toggle('hidden', totalPages <= 1);
      const prevBtn = pagi.querySelector('button:first-child');
      const nextBtn = pagi.querySelector('button:last-child');

      if (nextBtn) nextBtn.disabled = currentHistoryPage >= totalPages;

  function renderBallsHTML(codes, waves, zodiacs) {

      const wave = waves[i];
      const zod = zodiacs[i];
      const cc = wave === 'blue' || wave === '蓝' ? 'history-ball-blue' : (wave === 'green' || wave === '绿' ? 'history-ball-green' : 'history-ball-red');
      const num = parseInt(codes[i],10);

      html += `<div class="history-ball-card ${cc}"><div class="history-ball-number">${codes[i]}</div><div class="history-ball-tag">${zod}/${five}</div></div>`;

  window.prevHistoryPage = function() { if (currentHistoryPage > 1) { currentHistoryPage--; renderHistoryPage(); } };

  async function loadHistoryYear(year) {

  // ---------- 粒子系统 ----------
  function ParticleSystem() {
    this.canvas = document.getElementById('particle-canvas');
    if (!this.canvas) return;
    this.ctx = this.canvas.getContext('2d');
    this.particles = [];
    this.resizeCanvas();
    window.addEventListener('resize', () => this.resizeCanvas());
    this.createBackgroundParticles();
    this.animate();
  }
  ParticleSystem.prototype.resizeCanvas = function() {
    if (!this.canvas) return;
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
  };
  ParticleSystem.prototype.createBackgroundParticles = function() {
    if (!this.canvas) return;
    for (let i = 0; i < 30; i++) {
      this.particles.push({
        x: Math.random() * this.canvas.width,
        y: Math.random() * this.canvas.height,
        size: Math.random() * 2 + 0.5,
        speedX: (Math.random() - 0.5) * 0.5,
        speedY: (Math.random() - 0.5) * 0.5,
        color: 'rgba(' + (Math.random() * 100 + 155 | 0) + ',' + (Math.random() * 100 + 155 | 0) + ',255,' + (Math.random() * 0.3 + 0.1).toFixed(2) + ')',
        type: 'background'
      });
    }
  };
  ParticleSystem.prototype.createExplosion = function(x, y, color, count) {
    color = color || '#ff3366';
    count = count || 15;
    for (let i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = Math.random() * 3 + 1;
      this.particles.push({
        x: x, y: y,
        size: Math.random() * 4 + 2,
        speedX: Math.cos(angle) * speed,
        speedY: Math.sin(angle) * speed,
        color: color,
        life: 1.0,
        decay: Math.random() * 0.03 + 0.02,
        type: 'explosion'
      });
    }
  };
  ParticleSystem.prototype.createFireworks = function(x, y, color, count) {
    color = color || '#00ffea';
    count = count || 50;
    for (let i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = Math.random() * 5 + 2;
      this.particles.push({
        x: x, y: y,
        size: Math.random() * 3 + 1,
        speedX: Math.cos(angle) * speed,
        speedY: Math.sin(angle) * speed,
        color: color,
        life: 1.0,
        decay: Math.random() * 0.02 + 0.01,
        gravity: 0.05,
        type: 'firework'
      });
    }
  };
  ParticleSystem.prototype.createTrail = function(x, y, color) {
    color = color || '#00ffea';
    for (let i = 0; i < 3; i++) {
      this.particles.push({
        x: x + (Math.random() - 0.5) * 10,
        y: y + (Math.random() - 0.5) * 10,
        size: Math.random() * 2 + 1,
        speedX: (Math.random() - 0.5) * 2,
        speedY: (Math.random() - 0.5) * 2,
        color: color,
        life: 0.7,
        decay: 0.03,
        type: 'trail'
      });
    }
  };
  ParticleSystem.prototype.animate = function() {
    if (!this.canvas || !this.ctx) return;
    var self = this;
    var ctx = this.ctx;
    var w = this.canvas.width;
    var h = this.canvas.height;
    ctx.fillStyle = 'rgba(5, 5, 16, 0.1)';
    ctx.fillRect(0, 0, w, h);
    for (var i = self.particles.length - 1; i >= 0; i--) {
      var p = self.particles[i];
      p.x += p.speedX;
      p.y += p.speedY;
      if (p.gravity) p.speedY += p.gravity;
      if (p.life !== undefined) {
        p.life -= p.decay;
        if (p.life <= 0) {
          self.particles.splice(i, 1);
          continue;
        }
      }
      if (p.type === 'background') {
        if (p.x < 0) p.x = w;
        if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h;
        if (p.y > h) p.y = 0;
      }
      ctx.globalAlpha = p.life !== undefined ? p.life : 0.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1.0;
    requestAnimationFrame(function() { self.animate(); });
  };

  // ---------- 初始化入口 ----------
  function init() {
    cacheDOM();
    loadState();
    subscribe(onStateChange);
    initResultDelegation();
    new ParticleSystem();
    DrawerSystem.setupGlobalListeners();

    if (DOM.exampleBtn) DOM.exampleBtn.addEventListener('click', () => { if (DOM.numbers) DOM.numbers.value = '龙蛇马 12 25 36 8 17 29 41 5 19 33 47'; runAnalysis(); });
    if (DOM.clearBtn) DOM.clearBtn.addEventListener('click', () => { if (DOM.numbers) DOM.numbers.value = ''; runAnalysis(); showToast('已清空输入'); });
    if (DOM.copyResultBtn) DOM.copyResultBtn.addEventListener('click', copyResult);
    if (DOM.numbers) {
      DOM.numbers.addEventListener('input', runAnalysis);
      DOM.numbers.addEventListener('compositionstart', () => { isComposing = true; });
      DOM.numbers.addEventListener('compositionend', () => { isComposing = false; runAnalysis(); });
    }
    if (DOM.refreshLotteryBtn) DOM.refreshLotteryBtn.addEventListener('click', fetchLottery);

    const navItems = document.querySelectorAll('.nav-item');
    if (navItems.length) {
      navItems.forEach(btn => {
        btn.removeEventListener('click', navClickHandler);
        btn.addEventListener('click', navClickHandler);
      });
    }
    function navClickHandler(e) {
      e.stopPropagation();
      const drawer = this.dataset.drawer;
      if (drawer === 'selectnone') {
        clearAllFilters();
        const killInput = document.getElementById('kill-input');
        if (killInput) killInput.value = '';
        DrawerSystem.close();
        showToast('已重置所有筛选');
      } else {
        DrawerSystem.open(drawer);
      }
    }

    if (DOM.drawer_close) DOM.drawer_close.addEventListener('click', () => DrawerSystem.close());
    if (DOM.drawer_overlay) DOM.drawer_overlay.addEventListener('click', () => DrawerSystem.close());

    fetchLottery();
    runAnalysis();
    initAutoRefresh();
    window.addEventListener('beforeunload', () => {
      if (countdownTimer) clearInterval(countdownTimer);
      if (autoRefreshTimer) clearInterval(autoRefreshTimer);
      if (regularPollTimer) clearInterval(regularPollTimer);
    });
    console.log('✅ 神码再现 v3.7.2 已加载（主线程版，无 Worker）');
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
